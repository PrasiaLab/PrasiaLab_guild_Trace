name: Update Guild Trace

on:
  workflow_dispatch:
    inputs:
      snapshot_id:
        description: "스냅샷 ID (예: 2026-06-25_1200, 비우면 현재 시간)"
        required: false
        default: ""
      before:
        description: "비교할 이전 스냅샷 ID (선택, 비우면 직전 스냅샷 자동 선택)"
        required: false
        default: ""
      guild_source:
        description: "결사 랭킹 원본 JSON 경로"
        required: false
        default: "data/Who_are_you_guild_score.json"
      no_compare:
        description: "스냅샷만 저장하고 비교는 건너뛰기 (true/false)"
        required: false
        default: "false"

  # 필요하면 아래 주석을 풀어서 자동 실행 가능
  # schedule:
  #   - cron: "0 */3 * * *"  # 3시간마다 실행(UTC 기준)

permissions:
  contents: write

jobs:
  update-trace:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run trace updater
        shell: bash
        run: |
          CMD="python scripts/run_trace.py"

          if [ -n "${{ github.event.inputs.snapshot_id }}" ]; then
            CMD="$CMD --snapshot-id '${{ github.event.inputs.snapshot_id }}'"
          fi

          if [ -n "${{ github.event.inputs.before }}" ]; then
            CMD="$CMD --before '${{ github.event.inputs.before }}'"
          fi

          if [ -n "${{ github.event.inputs.guild_source }}" ]; then
            CMD="$CMD --guild-source '${{ github.event.inputs.guild_source }}'"
          fi

          if [ "${{ github.event.inputs.no_compare }}" = "true" ]; then
            CMD="$CMD --no-compare"
          fi

          echo "$CMD"
          eval "$CMD"

      - name: Commit updated trace data
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data logs || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update guild trace data"
            git push
          fi
