name: Update Guild Trace

on:
  workflow_dispatch:
    inputs:
      snapshot_id:
        description: "스냅샷 ID (예: 2026-06-25_1200, 비우면 현재 시간)"
        required: false
        default: ""
      before:
        description: "비교할 이전 스냅샷 ID (선택, 비우면 직전 스냅샷 자동 선택)"
        required: false
        default: ""
      no_compare:
        description: "스냅샷만 저장하고 비교는 건너뛰기 (true/false)"
        required: false
        default: "false"
      use_existing:
        description: "원천 랭킹 API 추출을 건너뛰고 기존 JSON 사용 (true/false)"
        required: false
        default: "false"

  # 자동 갱신이 필요하면 아래 주석을 풀어 사용하세요. UTC 기준입니다.
  # schedule:
  #   - cron: "0 */3 * * *"  # 3시간마다 실행

permissions:
  contents: write

jobs:
  update-trace:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run trace updater
        shell: bash
        env:
          PRASIA_API_TOKEN: ${{ secrets.PRASIA_API_TOKEN }}
          SNAPSHOT_ID: ${{ github.event.inputs.snapshot_id }}
          BEFORE_ID: ${{ github.event.inputs.before }}
          NO_COMPARE: ${{ github.event.inputs.no_compare }}
          USE_EXISTING: ${{ github.event.inputs.use_existing }}
        run: |
          CMD="python scripts/run_trace.py"

          if [ -n "$SNAPSHOT_ID" ]; then
            CMD="$CMD --snapshot-id '$SNAPSHOT_ID'"
          fi

          if [ -n "$BEFORE_ID" ]; then
            CMD="$CMD --before '$BEFORE_ID'"
          fi

          if [ "$NO_COMPARE" = "true" ]; then
            CMD="$CMD --no-compare"
          fi

          if [ "$USE_EXISTING" = "true" ]; then
            CMD="$CMD --use-existing"
          fi

          echo "$CMD"
          eval "$CMD"

      - name: Commit updated trace data
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data logs || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update guild trace data"
            git push
          fi
